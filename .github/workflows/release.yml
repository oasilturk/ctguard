name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"  # latest 1.25.x patch; ships release binaries free of known stdlib CVEs

      - name: Run tests
        run: go test ./...

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "v2.16.0"  # pinned: deprecated keys still accepted; no surprise break on a future v2 minor
          args: release --clean
        env:
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}  # use the pushed tag, not git-describe (avoids picking a sibling tag on the same commit)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
