name: ci

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Download modules
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0
          args: --timeout=3m

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out -coverpkg=./internal/...,./cmd/... ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build CTGuard
        run: go build -o ctguard ./cmd/ctguard

      - name: Run CTGuard (self-check)
        run: ./ctguard -format=sarif -fail=false ./... > ctguard-results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true  # TODO: Enable code scanning in the repo settings
        with:
          sarif_file: ctguard-results.sarif
          category: ctguard
