name: ci

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Download modules
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0
          args: --timeout=3m

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out -coverpkg=./internal/...,./cmd/... ./...

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          COLOR=red
          if (( $(echo "$COVERAGE >= 70" | bc -l) )); then COLOR=brightgreen
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then COLOR=green
          elif (( $(echo "$COVERAGE >= 50" | bc -l) )); then COLOR=yellow
          fi
          curl -s "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}" > /dev/null
          mkdir -p .badges
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COVERAGE}%\",\"color\":\"${COLOR}\"}" > .badges/coverage.json

      - name: Deploy coverage badge
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .badges
          destination_dir: .badges
          keep_files: true

      - name: Build CTGuard
        run: go build -o ctguard ./cmd/ctguard

      - name: Run CTGuard (self-check)
        run: ./ctguard -format=sarif -fail=false ./... > ctguard-results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true  # TODO: Enable code scanning in the repo settings
        with:
          sarif_file: ctguard-results.sarif
          category: ctguard
