version: 2

builds:
  - main: ./cmd/ctguard
    binary: ctguard
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: oasilturk
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/oasilturk/ctguard"
    description: "Detect timing side-channel vulnerabilities in Go code"
    license: "MIT"
    skip_upload: "auto"  # do not push a Homebrew formula for prereleases (-rc, etc.)
    install: |
      bin.install "ctguard"

release:
  prerelease: auto  # tags like v1.0.0-rc.1 are marked as GitHub prereleases, not "Latest"
  replace_existing_artifacts: true  # re-runs replace assets instead of failing with 422 already_exists

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
